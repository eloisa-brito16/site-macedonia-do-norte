<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macedônia do Norte - Portal de Turismo</title>
    <link rel="stylesheet" href="menu.css">
</head>
<body>

    <header class="header-bar">
        <div class="logo-circle">
            <img src="logo.png" alt="Logo HT">
        </div>
        <h1 class="main-title">MACEDÔNIA DO NORTE</h1>
    </header>

    <main class="content-area">
        
        <section class="travel-card">
            <div class="card-badge">Macedônia do Norte</div>
            <div class="card-image-box">
                <img src="img/macedonia.png" alt="Ohrid, Macedônia do Norte">
            </div>
            <div class="price-box">
                <p class="price-label">A partir de</p>
                <p class="price-value">3x 590,42</p>
            </div>
        </section>

        <section class="topics-column">
            <button class="topic-button" >Política</button>
            <button class="topic-button" >Economia</button>
            <button class="topic-button" >Religião</button>
        </section>

        <section class="topics-column">
            <button class="topic-button" >Cultura</button>
            <button class="topic-button" >Pontos Turísticos</button>
            <button class="topic-button" >Curiosidades</button>
        </section>

    </main>

</body>
</html>
